<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiChess • Play Chess Online</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@lichess-org/chessground@10.1.0/assets/chessground.base.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@lichess-org/chessground@10.1.0/assets/chessground.brown.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@lichess-org/chessground@10.1.0/assets/chessground.cburnett.css"/>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar">
        <div class="logo-section">
            <img src="/img/pionV.png" alt="logo" class="logo">
            <span class="title">HiChess</span>
        </div>
        <div class="info-section">
            <span id="ratingDisplay">Rating: 1200</span>
            <span id="version">v1.0</span>
        </div>
    </div>

    <div id="container">
        <!-- LEFT: Empty space -->
        <div id="left-spacer"></div>

        <!-- CENTER: Board -->
        <div id="main-game">
            <div id="board" class="chessboard"></div>
        </div>

        <!-- RIGHT: Dashboard / Game Controls -->
        <div id="right-panel">
            <!-- Endgame Selection Dashboard (shown when not in game) -->
            <div id="endgameDashboard" class="dashboard">
                <h2>Endgame Dashboard</h2>
                <div class="endgame-buttons">
                    <button class="endgame-btn" data-type="pawn_vs_king">
                        <span class="btn-label">Pawns</span>
                        <span class="btn-desc">King & Pawn vs King</span>
                    </button>
                    <button class="endgame-btn" data-type="rook_vs_king">
                        <span class="btn-label">Rook</span>
                        <span class="btn-desc">Rook vs King</span>
                    </button>
                    <button class="endgame-btn" data-type="queen_vs_king">
                        <span class="btn-label">Queen</span>
                        <span class="btn-desc">Queen vs King</span>
                    </button>
                    <button class="endgame-btn" data-type="bishop_vs_king">
                        <span class="btn-label">Bishop</span>
                        <span class="btn-desc">Bishop vs King</span>
                    </button>
                    <button class="endgame-btn" data-type="knight_vs_king">
                        <span class="btn-label">Knight</span>
                        <span class="btn-desc">Knight vs King</span>
                    </button>
                    <button class="endgame-btn random-btn" id="randomEndgameBtn">
                        <span class="btn-label">Random</span>
                        <span class="btn-desc">Random Endgame</span>
                    </button>
                </div>
            </div>

            <!-- Game Info Panel (shown during game) -->
            <div id="gamePanel" class="game-panel" style="display: none;">
                <div class="opponent-label">Opponent</div>

                <div class="game-info">
                    <div id="status" class="status-box">White to move</div>
                    <div class="move-counter">
                        <span>Moves: <strong id="moveCount">0</strong></span>
                    </div>
                </div>

                <!-- Move Navigation -->
                <div class="move-navigation">
                    <button class="nav-btn" id="firstMoveBtn" title="First move">⏮</button>
                    <button class="nav-btn" id="prevMoveBtn" title="Previous move">◀</button>
                    <button class="nav-btn" id="nextMoveBtn" title="Next move">▶</button>
                    <button class="nav-btn" id="lastMoveBtn" title="Last move">⏭</button>
                </div>

                <!-- Moves List -->
                <div class="moves-list" id="movesList"></div>

                <div class="controls-group">
                    <button id="newEndgameBtn" class="btn-primary">New Endgame</button>
                    <button id="undoBtn" class="btn-secondary" disabled>Undo</button>
                    <button id="resignBtn" class="btn-danger">Resign</button>
                </div>

                <div class="result-box" id="resultBox" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Player indicator at bottom left -->
    <div id="playerIndicator" class="player-indicator">You (White)</div>

    <script type="module" src="/js/main.js"></script>
</body>
</html>
